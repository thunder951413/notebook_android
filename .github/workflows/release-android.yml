name: Release Android
on:
  push:
    tags: ['android-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version, for example 0.2.0'
        required: true
      publish_release:
        description: 'Publish a GitHub Release after the signed build'
        required: true
        default: false
        type: boolean
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Prepare signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
      - name: Build signed APK
        env:
          VERSION_NAME: ${{ inputs.version || github.ref_name }}
          VERSION_CODE_BASE: ${{ github.run_number }}
          RELEASE_STORE_FILE: ${{ runner.temp }}/release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          VERSION_NAME="${VERSION_NAME#android-v}"
          VERSION_NAME="${VERSION_NAME#v}"
          export VERSION_NAME
          export VERSION_CODE=$((VERSION_CODE_BASE + 10000))
          ./gradlew test lintRelease assembleRelease -PgithubRepository="$GITHUB_REPOSITORY"
          cp app/build/outputs/apk/release/app-release.apk notebook-android.apk
          shasum -a 256 notebook-android.apk > notebook-android.apk.sha256
      - name: Upload signed test artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: notebook-android-${{ inputs.version }}
          path: |
            notebook-android.apk
            notebook-android.apk.sha256
          retention-days: 3
      - name: Publish GitHub Release
        if: github.event_name == 'push' || inputs.publish_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('android-v{0}', inputs.version) }}
          target_commitish: ${{ github.sha }}
          name: Notebook Android ${{ inputs.version || github.ref_name }}
          generate_release_notes: true
          files: |
            notebook-android.apk
            notebook-android.apk.sha256
